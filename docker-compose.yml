version: "3.8"

services:
  db:
    build:
      context: .
      dockerfile: DockerfileDB
    container_name: lib-postgres-db
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lib-network

  lib-service:
#    build:
#      context: .
#      dockerfile: Dockerfile
    image: atiss/nodejs2025q2-service:0.0.4
    container_name: lib-service
    depends_on:
      - db
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      CRYPT_SALT: ${CRYPT_SALT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_SECRET_REFRESH_KEY: ${JWT_SECRET_REFRESH_KEY}
      TOKEN_EXPIRE_TIME: ${TOKEN_EXPIRE_TIME}
      TOKEN_REFRESH_EXPIRE_TIME: ${TOKEN_REFRESH_EXPIRE_TIME}

      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_LEVEL: ${LOG_LEVEL:-log}
      LOG_FILE_SIZE_LIMIT: ${LOG_FILE_SIZE_LIMIT:-100}
    networks:
      - lib-network
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
    driver: local
  logs:
    driver: local
networks:
    lib-network:
        driver: bridge