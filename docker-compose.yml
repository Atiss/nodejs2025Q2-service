version: "3.8"

services:
  db:
    build:
      context: .
      dockerfile: DockerfileDB
    container_name: lib-postgres-db
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lib-network

  lib-service:
#    build:
#      context: .
#      dockerfile: Dockerfile
    image: atiss/nodejs2025q2-service:0.0.2
    container_name: lib-service
    depends_on:
      - db
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    networks:
      - lib-network
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
    driver: local
  logs:
    driver: local
networks:
    lib-network:
        driver: bridge